<section class="card card--narrow">
  <h2>Login</h2>
  <form class="form-stack" [formGroup]="form" (ngSubmit)="submit()">
    <label class="field">
      Email
      <input type="email" formControlName="email" />
    </label>
    <label class="field">
      Password
      <input type="password" formControlName="password" />
    </label>
    @if (error) {
    <p class="error">{{ error }}</p>
    }
    <button class="btn" type="submit" [disabled]="form.invalid || loading">
      Login
    </button>
  </form>
  <p class="auth-footer">No account? <a routerLink="/register">Register</a></p>
</section>
