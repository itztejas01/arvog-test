<section class="card">
  <h2>Categories</h2>

  <form class="form-row" [formGroup]="form" (ngSubmit)="save()">
    <input type="text" formControlName="name" placeholder="Category name" />
    <button class="btn" type="submit" [disabled]="form.invalid || saving">
      {{ editingId ? "Update" : "Add" }}
    </button>
    @if (editingId) {
    <button class="btn btn--secondary" type="button" (click)="cancelEdit()">
      Cancel
    </button>
    }
  </form>

  @if (error) {
  <p class="error">{{ error }}</p>
  }

  <table class="data-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Unique ID</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (cat of categories; track cat.id) {
      <tr>
        <td>{{ cat.name }}</td>
        <td>
          <code>{{ cat.id }}</code>
        </td>
        <td class="actions">
          <button class="btn" type="button" (click)="startEdit(cat)">
            Edit
          </button>
          <button class="btn btn--danger" type="button" (click)="remove(cat)">
            Delete
          </button>
        </td>
      </tr>
      } @empty {
      <tr>
        <td colspan="3">No categories yet.</td>
      </tr>
      }
    </tbody>
  </table>
</section>
