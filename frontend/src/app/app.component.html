<div class="min-h-screen bg-muted">
  <header class="sticky top-0 z-40 border-b border-border bg-background/95 backdrop-blur">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-3">
        <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary text-sm font-bold text-primary-foreground">
          A
        </div>
        <div>
          <p class="text-sm font-semibold">Avrog</p>
          <p class="text-xs text-muted-foreground">Product platform</p>
        </div>
      </div>

      @if (auth.isLoggedIn()) {
        <div class="flex items-center gap-3">
          <span class="hidden text-sm text-muted-foreground sm:inline">
            {{ auth.currentUser()?.email }}
          </span>
          <ui-button variant="outline" size="sm" (clicked)="logout()">Logout</ui-button>
        </div>
      }
    </div>
  </header>

  <div class="mx-auto flex max-w-7xl gap-6 px-4 py-6 sm:px-6 lg:px-8">
    @if (auth.isLoggedIn()) {
      <aside class="hidden w-56 shrink-0 md:block">
        <nav class="space-y-1 rounded-lg border border-border bg-background p-2 shadow-sm">
          @for (item of navItems; track item.path) {
            <a
              [routerLink]="item.path"
              routerLinkActive="bg-muted font-medium text-foreground"
              [routerLinkActiveOptions]="item.exact ? { exact: true } : { exact: false }"
              class="flex items-center rounded-md px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
            >
              {{ item.label }}
            </a>
          }
        </nav>
      </aside>
    }

    <main class="min-w-0 flex-1">
      <router-outlet />
    </main>
  </div>
</div>
