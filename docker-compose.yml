services:
  postgres:
    image: postgres:16-alpine
    container_name: project-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: productdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
