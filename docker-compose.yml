services:
  postgres:
    image: postgres:16-alpine
    container_name: avrog-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: avrogdb
    volumes:
      - avrog_postgres_data:/var/lib/postgresql/data

volumes:
  avrog_postgres_data:
